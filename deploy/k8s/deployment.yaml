apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api
  labels:
    app: agent-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
    spec:
      containers:
        - name: api
          image: ghcr.io/teslashibe/claude-agent-go:latest
          command: ["/bin/server"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ANTHROPIC_MODEL
              value: claude-sonnet-4-5-20250929
            - name: AGENT_MAX_TOOL_ITERATIONS
              value: "10"
          envFrom:
            - secretRef:
                name: agent-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
