apiVersion: batch/v1
kind: Job
metadata:
  name: agent-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/teslashibe/claude-agent-go:latest
          command: ["/bin/migrate", "up"]
          envFrom:
            - secretRef:
                name: agent-secrets
